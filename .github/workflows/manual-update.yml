name: Manual Package Update

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Ulaa version to package (e.g., 3.0.5)'
        required: true
        type: string

jobs:
  update:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Get download URL and checksum
        id: prepare
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $url = "https://downloads.zohocdn.com/ulaa-browser/release/win/Ulaa-Online-Installer-v$version.msi"
          
          $file = Join-Path $env:TEMP 'ulaa-installer.msi'
          Invoke-WebRequest -Uri $url -OutFile $file
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash
          
          echo "download_url=$url" >> $env:GITHUB_OUTPUT
          echo "checksum=$hash" >> $env:GITHUB_OUTPUT
      
      - name: Update files
        shell: pwsh
        run: |
          # Update nuspec
          $nuspec = Get-Content "ulaa.nuspec" -Raw
          $nuspec = $nuspec -replace '<version>.*?</version>', "<version>${{ inputs.version }}</version>"
          Set-Content "ulaa.nuspec" $nuspec
          
          # Update install script
          $script = Get-Content "tools/chocolateyinstall.ps1" -Raw
          $script = $script -replace "v\d+\.\d+\.\d+", "v${{ inputs.version }}"
          $script = $script -replace "\`$checksum = '.*?'", "`$checksum = '${{ steps.prepare.outputs.checksum }}'"
          Set-Content "tools/chocolateyinstall.ps1" $script
      
      - name: Build and push
        shell: pwsh
        run: |
          choco pack
          choco push ulaa.${{ inputs.version }}.nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCO_API_KEY }}
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ulaa.nuspec tools/chocolateyinstall.ps1
          git commit -m "Update to version ${{ inputs.version }}"
          git push
